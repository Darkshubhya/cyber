<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Science of Cyber Security - Slide Seminar</title>

    <!-- Google Fonts matching index.html for visual consistency -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <style>
        /* Modern Cyber CSS variables */
        :root {
            --bg-primary: #05070c;
            --bg-secondary: #0a0e1a;
            --bg-card: rgba(13, 20, 38, 0.75);
            --border-glow: rgba(0, 242, 254, 0.15);
            --border-glow-focus: rgba(0, 242, 254, 0.55);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --cyber-cyan: #00f2fe;
            --cyber-purple: #8b5cf6;
            --cyber-green: #10b981;
            --cyber-red: #ef4444;
            --cyber-yellow: #f59e0b;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Cyber Background Grid */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(13, 20, 38, 0.6) 2px, transparent 2px),
                linear-gradient(90deg, rgba(13, 20, 38, 0.6) 2px, transparent 2px);
            background-size: 50px 50px;
            z-index: -2;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.05) 0%, transparent 80%);
            z-index: -1;
            pointer-events: none;
        }

        /* Navbar Layout */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 30px;
            background: rgba(5, 7, 12, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 242, 254, 0.15);
            z-index: 100;
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            fill: var(--cyber-cyan);
            filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.4));
        }

        .logo-text {
            font-family: var(--font-display);
            font-size: 17px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--cyber-cyan), var(--cyber-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.05em;
        }

        .nav-actions {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .btn-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid var(--border-glow);
            color: var(--text-primary);
            padding: 8px 18px;
            border-radius: 6px;
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-nav:hover {
            border-color: var(--cyber-cyan);
            color: var(--cyber-cyan);
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.25);
        }

        /* Presentation Layout */
        .workspace {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
            padding: 24px;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
            gap: 20px;
        }

        /* Slide Container */
        .slide-container {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            min-height: 520px;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.3s ease;
        }

        @media (max-width: 900px) {
            .slide-container {
                grid-template-columns: 1fr;
                min-height: auto;
            }

            .slide-right {
                border-left: none;
                border-top: 1px solid rgba(0, 242, 254, 0.15);
                padding: 30px 24px;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                padding: 14px;
                gap: 12px;
                text-align: center;
            }

            .nav-actions {
                flex-wrap: wrap;
                justify-content: center;
                gap: 8px;
                width: 100%;
            }

            .btn-nav {
                padding: 6px 12px;
                font-size: 10px;
            }
        }

        @media (max-width: 600px) {
            .slide-left {
                padding: 24px;
            }

            .slide-title {
                font-size: 22px;
            }

            .slide-subtitle {
                font-size: 11.5px;
                margin-bottom: 16px;
            }

            .slide-bullets li {
                font-size: 13px;
                padding-left: 20px;
            }

            .slide-bullets li::before {
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .control-hud {
                padding: 10px 14px;
            }

            .btn-ctrl {
                padding: 8px 12px;
                font-size: 9px;
            }

            .progress-dot {
                width: 5px;
                height: 5px;
            }
        }

        .slide-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--cyber-cyan), var(--cyber-purple));
            z-index: 2;
        }

        /* Slide Panels */
        .slide-left {
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .slide-right {
            background: rgba(5, 7, 12, 0.55);
            border-left: 1px solid rgba(0, 242, 254, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        /* Typography */
        .slide-index-tag {
            font-family: var(--font-display);
            font-size: 11px;
            color: var(--cyber-cyan);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .slide-title {
            font-family: var(--font-display);
            font-size: clamp(24px, 3.5vw, 36px);
            font-weight: 900;
            color: white;
            line-height: 1.25;
            margin-bottom: 6px;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
        }

        .slide-subtitle {
            font-size: 13.5px;
            color: var(--cyber-purple);
            margin-bottom: 24px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .slide-bullets {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .slide-bullets li {
            position: relative;
            padding-left: 28px;
            font-size: 14.5px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .slide-bullets li::before {
            content: "✦";
            position: absolute;
            left: 0;
            top: 2px;
            color: var(--cyber-cyan);
            text-shadow: 0 0 8px var(--cyber-cyan);
            font-size: 14px;
        }

        .slide-bullets li strong {
            color: var(--text-primary);
        }

        /* Slide Graphics */
        .slide-media {
            max-width: 90%;
            max-height: 380px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.15);
            animation: float 5s ease-in-out infinite;
            border: 1px solid rgba(0, 242, 254, 0.1);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* Control HUD */
        .control-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 14, 26, 0.85);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 14px 24px;
            backdrop-filter: blur(12px);
        }

        .btn-ctrl {
            background: rgba(5, 7, 12, 0.7);
            border: 1px solid var(--border-glow);
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-ctrl:hover:not(:disabled) {
            border-color: var(--cyber-cyan);
            color: var(--cyber-cyan);
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.3);
        }

        .btn-ctrl:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .slide-progress-dots {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .progress-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(148, 163, 184, 0.25);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .progress-dot.active {
            background: var(--cyber-cyan);
            box-shadow: 0 0 10px var(--cyber-cyan);
            transform: scale(1.4);
        }

        /* Speaker Notes Panel */
        .notes-panel {
            background: rgba(10, 14, 26, 0.9);
            border: 1px solid rgba(245, 158, 11, 0.25);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            background: rgba(245, 158, 11, 0.06);
            border-bottom: 1px solid rgba(245, 158, 11, 0.15);
            cursor: pointer;
            user-select: none;
        }

        .notes-title {
            font-family: var(--font-display);
            font-size: 12px;
            font-weight: 700;
            color: var(--cyber-yellow);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .notes-body {
            padding: 24px;
            font-size: 14px;
            color: var(--text-primary);
            max-height: 260px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .notes-body strong {
            color: var(--cyber-cyan);
        }

        .notes-body ul {
            list-style: none;
            padding-left: 0;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .notes-body li {
            position: relative;
            padding-left: 22px;
            color: var(--text-secondary);
        }

        .notes-body li::before {
            content: "→";
            position: absolute;
            left: 0;
            color: var(--cyber-yellow);
            font-weight: bold;
        }

        /* Slide Interactive Tools */
        .slide-tool-box {
            width: 100%;
            max-width: 440px;
            background: rgba(5, 7, 12, 0.9);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Roadmap Viewer CSS */
        .roadmap-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            min-height: 380px;
            max-height: 420px;
            background: rgba(10, 14, 26, 0.95);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.4s ease forwards;
        }

        .roadmap-months {
            display: flex;
            border-bottom: 1px solid rgba(0, 242, 254, 0.15);
            background: rgba(5, 7, 12, 0.6);
        }

        .roadmap-tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-secondary);
            padding: 10px 5px;
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .roadmap-tab-btn:hover {
            color: var(--cyber-cyan);
            background: rgba(0, 242, 254, 0.03);
        }

        .roadmap-tab-btn.active {
            color: var(--cyber-cyan);
            border-bottom-color: var(--cyber-cyan);
            background: rgba(0, 242, 254, 0.06);
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.3);
        }

        .roadmap-body {
            display: grid;
            grid-template-columns: 80px 1fr;
            flex: 1;
            overflow: hidden;
        }

        .roadmap-weeks {
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(0, 242, 254, 0.15);
            background: rgba(5, 7, 12, 0.3);
            padding: 8px 0;
            gap: 4px;
        }

        .roadmap-week-btn {
            background: transparent;
            border: none;
            border-left: 3px solid transparent;
            color: var(--text-secondary);
            padding: 10px 8px;
            font-family: var(--font-display);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .roadmap-week-btn:hover {
            color: var(--cyber-purple);
            background: rgba(139, 92, 246, 0.03);
        }

        .roadmap-week-btn.active {
            color: var(--cyber-purple);
            border-left-color: var(--cyber-purple);
            background: rgba(139, 92, 246, 0.08);
        }

        .roadmap-days-list {
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
        }

        .roadmap-day-card {
            display: flex;
            gap: 12px;
            background: rgba(13, 20, 38, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            padding: 10px 12px;
            transition: all 0.3s ease;
        }

        .roadmap-day-card:hover {
            border-color: rgba(0, 242, 254, 0.25);
            background: rgba(13, 20, 38, 0.7);
            transform: translateX(2px);
        }

        .roadmap-day-badge {
            background: linear-gradient(135deg, var(--cyber-cyan), var(--cyber-purple));
            color: var(--bg-primary);
            font-family: var(--font-display);
            font-size: 9px;
            font-weight: 800;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 8px rgba(0, 242, 254, 0.25);
        }

        .roadmap-day-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .roadmap-day-title {
            font-size: 12.5px;
            font-weight: 700;
            color: white;
            margin-bottom: 2px;
        }

        .roadmap-day-desc {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* Q&A Interactive Box CSS */
        .qa-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            min-height: 380px;
            max-height: 420px;
            background: rgba(10, 14, 26, 0.95);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            padding: 16px;
            gap: 12px;
            animation: fadeIn 0.4s ease forwards;
        }

        .qa-item {
            background: rgba(13, 20, 38, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .qa-item:hover {
            border-color: rgba(0, 242, 254, 0.25);
            background: rgba(13, 20, 38, 0.7);
        }

        .qa-question-btn {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            padding: 14px 16px;
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .qa-question-btn:hover {
            color: var(--cyber-cyan);
        }

        .qa-question-btn::after {
            content: "▼";
            font-size: 10px;
            color: var(--cyber-purple);
            transition: transform 0.3s ease;
        }

        .qa-item.active .qa-question-btn::after {
            transform: rotate(-180deg);
            color: var(--cyber-cyan);
        }

        .qa-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0, 1, 0, 1);
            background: rgba(5, 7, 12, 0.4);
            border-top: 1px solid transparent;
        }

        .qa-item.active .qa-answer {
            max-height: 200px;
            border-top-color: rgba(148, 163, 184, 0.1);
            transition: max-height 0.3s cubic-bezier(1, 0, 1, 0);
        }

        .qa-answer-content {
            padding: 14px 16px;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .qa-answer-content strong {
            color: var(--cyber-cyan);
        }
    </style>
</head>

    </main>

    <script>
        // Simplified Cybersecurity slide presentation in English for kids & students (11 Slides)
        const slideDeck = [
            {
                title: "Welcome to Cybersecurity!",
                subtitle: "Introduction, Domains, and Careers",
                bullets: [
                    "Cybersecurity is not just about basic safety rules; it is a massive professional field.",
                    "In this presentation, we will explore what cybersecurity really means under the hood.",
                    "We will look at the different career roles like Ethical Hackers and Forensic Investigators.",
                    "We will see how defenders and investigators work together to secure digital infrastructure."
                ],
                image: "assets/cyber_corp.png"
            },
            {
                title: "About the Presenter",
                subtitle: "Presenter Profile & Achievements",
                bullets: [
                    "**Name**: Vedant Hondre (Investigator & Ethical Hacker)",
                    "**Role & Association**: Works with Maharashtra Police, Delhi Police, Haryana Police & other departments.",
                    "**What I Do**: Fraud investigation and assisting law enforcement in solving cybercrimes.",
                    "**Experience**: 2 Years of active field experience in Cyber Security & Forensic Investigations.",
                    "**Key Work**: Successfully investigated 100+ cyber crime cases and assisted police forces."
                ],
                images: [
                    "assets/vedanthondrewithpolice.jpg",
                    "assets/2ed306cd-8df7-4d1f-a91c-1724ae7fbdad.jpg",
                    "assets/cid.jpg",
                    "assets/delhipolice.jpg",
                    "assets/mhpolice.jpg",
                    "assets/vgu.jpg",
                    "assets/wakadpolice.jpg"
                ],
                notes: `
                    <strong>How to Present this Slide (Speak for 2-3 minutes):</strong>

                            { title: "CTF Platforms", desc: "Learn about CTF time, hackthebox, and joining college cyber teams." },
                            { title: "LinkedIn Networking", desc: "Build profiles, share lab reports, and connect with security leaders." },
                            { title: "Mock Interview Lab", desc: "Conduct a peer-interview or self-test of top 20 security interview Qs." }
                        ]
                    }
                }
            }
        };

        // Roadmap State Variables & Event Handlers
        let selectedMonth = 1;
        let selectedWeek = 1;

        function selectRoadmapMonth(m) {
            selectedMonth = m;
            selectedWeek = 1; // reset to week 1 of new month

            // Update Month buttons active state
            const monthBtns = document.querySelectorAll('.roadmap-tab-btn');
            monthBtns.forEach((btn, index) => {
                if (index + 1 === m) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Update Week buttons UI
            renderWeekButtons();
            // Render days
            renderRoadmapDays();
        }

        function selectRoadmapWeek(w) {
            selectedWeek = w;

            // Update Week buttons active state
            const weekBtns = document.querySelectorAll('.roadmap-week-btn');
            weekBtns.forEach((btn, index) => {
                if (index + 1 === w) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            renderRoadmapDays();
        }

        function renderWeekButtons() {
            const container = document.querySelector('.roadmap-weeks');
            if (!container) return;

            container.innerHTML = '';
            for (let w = 1; w <= 4; w++) {
                const btn = document.createElement('button');
                btn.className = `roadmap-week-btn ${w === selectedWeek ? 'active' : ''}`;
                btn.innerText = `Week ${w}`;
                btn.onclick = () => selectRoadmapWeek(w);
                container.appendChild(btn);
            }
        }

        function renderRoadmapDays() {
            const container = document.getElementById('roadmap-days-content');
            if (!container) return;

            container.innerHTML = '';
            const weekData = roadmapData[selectedMonth].weeks[selectedWeek];

            // Set a header explaining what this week is about
            const weekHeader = document.createElement('div');
            weekHeader.style.cssText = 'font-size:12px; font-weight:700; color:var(--cyber-purple); border-bottom:1px solid rgba(139, 92, 246, 0.2); padding-bottom:6px; margin-bottom:12px; font-family:var(--font-display);';
            weekHeader.innerText = `FOCUS: ${weekData.name.toUpperCase()}`;
            container.appendChild(weekHeader);

            weekData.days.forEach((day, index) => {
                const card = document.createElement('div');
                card.className = 'roadmap-day-card';

                card.innerHTML = `
                    <div class="roadmap-day-badge">D${index + 1}</div>
                    <div class="roadmap-day-info">
                        <div class="roadmap-day-title">${day.title}</div>
                        <div class="roadmap-day-desc">${day.desc}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        let currentSlideIndex = 0;

        // Render current slide deck content
        function renderSlide() {
            // Clear any running profile slideshow interval
            if (window.profileSlideshowInterval) {
                clearInterval(window.profileSlideshowInterval);
                window.profileSlideshowInterval = null;
            }

            const slide = slideDeck[currentSlideIndex];

            // Slide indicators
            document.getElementById('slide-indicator').innerText = `Slide ${String(currentSlideIndex + 1).padStart(2, '0')} of ${String(slideDeck.length).padStart(2, '0')}`;
            document.getElementById('slide-title').innerHTML = slide.title;
            document.getElementById('slide-subtitle').innerHTML = slide.subtitle;

            // Load bullet points
            const bulletsUl = document.getElementById('slide-bullets');
            bulletsUl.innerHTML = '';
            slide.bullets.forEach(bullet => {
                const li = document.createElement('li');
                // Convert markdown ** to <strong> to remove stars and make text bold
                li.innerHTML = bullet.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                bulletsUl.appendChild(li);
            });

            // Handle slide media/tools
            const rightPanel = document.getElementById('slide-right-panel');
            rightPanel.innerHTML = '';

            if (slide.tool) {
                rightPanel.appendChild(createToolMarkup(slide.tool));

                // Active scripts bindings
                if (slide.tool === 'roadmap-viewer') {
                    // Initialize the roadmap viewer
                    selectRoadmapMonth(1);
                }
            } else if (slide.images && slide.images.length > 0) {
                const img = document.createElement('img');
                img.src = slide.images[0];
                img.alt = slide.title;
                img.className = 'slide-media';
                img.style.transition = 'opacity 0.4s ease-in-out';
                rightPanel.appendChild(img);

                let imgIndex = 0;
                window.profileSlideshowInterval = setInterval(() => {
                    img.style.opacity = 0;
                    setTimeout(() => {
                        imgIndex = (imgIndex + 1) % slide.images.length;
                        img.src = slide.images[imgIndex];
                        img.style.opacity = 1;
                    }, 400);
                }, 3000);
            } else if (slide.image) {
                const img = document.createElement('img');
                img.src = slide.image;
                img.alt = slide.title;
                img.className = 'slide-media';
                rightPanel.appendChild(img);
            }



            // Control HUD bindings
            document.getElementById('btn-prev').disabled = (currentSlideIndex === 0);
            document.getElementById('btn-next').disabled = (currentSlideIndex === slideDeck.length - 1);

            updateDots();
        }

        // Generate tool nodes inside slides
        function createToolMarkup(toolName) {
            const div = document.createElement('div');
            div.className = 'slide-tool-box';

            if (toolName === 'roadmap-viewer') {
                div.className = 'roadmap-container';
                div.innerHTML = `
                    <!-- Month Selection Header -->
                    <div class="roadmap-months">
                        <button class="roadmap-tab-btn active" onclick="selectRoadmapMonth(1)">M1</button>
                        <button class="roadmap-tab-btn" onclick="selectRoadmapMonth(2)">M2</button>
                        <button class="roadmap-tab-btn" onclick="selectRoadmapMonth(3)">M3</button>
                        <button class="roadmap-tab-btn" onclick="selectRoadmapMonth(4)">M4</button>
                        <button class="roadmap-tab-btn" onclick="selectRoadmapMonth(5)">M5</button>
                        <button class="roadmap-tab-btn" onclick="selectRoadmapMonth(6)">M6</button>
                    </div>
                    
                    <div class="roadmap-body">
                        <!-- Week Selection Side Panel -->
                        <div class="roadmap-weeks">
                            <!-- Populated dynamically -->
                        </div>
                        
                        <!-- Day Content Area -->
                        <div class="roadmap-days-list" id="roadmap-days-content">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                `;
            } else if (toolName === 'qa-viewer') {
                div.className = 'qa-container';
                div.innerHTML = `
                    <div class="qa-item">
                        <button class="qa-question-btn" onclick="toggleQA(this)">📱 Is it safe to click on unknown links or messages?</button>
                        <div class="qa-answer">
                            <div class="qa-answer-content">
                                <strong>No!</strong> Clicking on unknown links can download harmful viruses or redirect you to fake websites that steal your private data. Always check with parents first.
                            </div>
                        </div>
                    </div>
                    <div class="qa-item">
                        <button class="qa-question-btn" onclick="toggleQA(this)">🔑 How should I create a strong password?</button>
                        <div class="qa-answer">
                            <div class="qa-answer-content">
                                A strong password is at least 8 characters long and combines <strong>uppercase letters (A-Z)</strong>, <strong>lowercase letters (a-z)</strong>, <strong>numbers (0-9)</strong>, and <strong>symbols (@, #, $)</strong>. E.g., <code>Shuruaat#2026</code>.
                            </div>
                        </div>
                    </div>
                    <div class="qa-item">
                        <button class="qa-question-btn" onclick="toggleQA(this)">💬 What if a stranger chats with me in an online game?</button>
                        <div class="qa-answer">
                            <div class="qa-answer-content">
                                <strong>Never</strong> share personal details like your name, school, phone number, or photo. Block them if they make you uncomfortable and tell a parent.
                            </div>
                        </div>
                    </div>
                    <div class="qa-item">
                        <button class="qa-question-btn" onclick="toggleQA(this)">📲 What is an OTP and can I share it with friends?</button>
                        <div class="qa-answer">
                            <div class="qa-answer-content">
                                OTP (One Time Password) is a secure verification key. <strong>Never share it with anyone</strong>, even friends. Sharing it lets others access your private accounts.
                            </div>
                        </div>
                    </div>
                    <div class="qa-item">
                        <button class="qa-question-btn" onclick="toggleQA(this)">💻 How can I protect my computer from viruses?</button>
                        <div class="qa-answer">
                            <div class="qa-answer-content">
                                Download apps and games <strong>only</strong> from official stores (Google Play Store/Apple App Store). Avoid pirated software and game cheats.
                            </div>
                        </div>
                    </div>
                `;
            }

            return div;
        }

        // Toggle Q&A items accordion
        function toggleQA(btn) {
            const item = btn.parentElement;
            const activeItems = document.querySelectorAll('.qa-item.active');
            activeItems.forEach(el => {
                if (el !== item) {
                    el.classList.remove('active');
                }
            });
            item.classList.toggle('active');
        }

        // Initialize progress bar tracker dots
        function initDots() {
            const container = document.getElementById('dots-container');
            container.innerHTML = '';
            slideDeck.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = `progress-dot ${index === 0 ? 'active' : ''}`;
                dot.onclick = () => jumpToSlide(index);
                container.appendChild(dot);
            });
        }

        function updateDots() {
            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((dot, index) => {
                if (index === currentSlideIndex) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        function nextSlide() {
            if (currentSlideIndex < slideDeck.length - 1) {
                currentSlideIndex++;
                renderSlide();
            }
        }

        // Previous slide handler
        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide();
            }
        }

        function jumpToSlide(index) {
            currentSlideIndex = index;
            renderSlide();
        }

        // Navigation keyboard binds
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            }
        });


        // Fullscreen handles
        function toggleFullscreen() {
            const isFS = document.body.classList.toggle('fullscreen-presentation');
            const btn = document.getElementById('btn-fullscreen');
            if (isFS) {
                btn.innerText = '❌ Exit Present Mode';
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            } else {
                btn.innerText = '🖥️ Present Mode';
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Execute initialization immediately since script is at the end of the body
        initDots();
        renderSlide();
    </script>
</body>

</html>
